[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Increase timeouts for slower functions
[functions."scan"]
  timeout = 26

[functions."lead"]
  timeout = 10

[functions."create-checkout-session"]
  timeout = 15

[functions."stripe-webhook"]
  timeout = 10

[build.environment]
  NODE_VERSION = "20"
