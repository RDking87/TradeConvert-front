[build]
  functions = "netlify/functions"
  command = "npm install"
  publish = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions."scan"]
  timeout = 26

[functions."lead"]
  timeout = 10

[functions."create-checkout-session"]
  timeout = 15

[functions."stripe-webhook"]
  timeout = 10

[functions."scan-chat"]
  timeout = 15

[build.environment]
  NODE_VERSION = "20"
