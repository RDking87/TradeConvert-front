<style>
/* ===== RESULTS SCALING ===== */
.results-container {
  max-width: 1100px;
  margin: 0 auto;
}

.score-circle {
  width: 90px;
  height: 90px;
}

.section-title {
  font-size: 28px;
}

.issue-title {
  font-size: 18px;
}

/* ===== PROBLEM BUTTONS ===== */
.problem-chip {
  cursor: pointer;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid #2a3a52;
  transition: all 0.2s ease;
}

.problem-chip:hover {
  border-color: #f4600c;
  transform: translateY(-1px);
}

.problem-chip.active {
  background: #f4600c;
  color: white;
}

/* ===== PACKAGE CARDS ===== */
.package-card {
  cursor: pointer;
  transition: all 0.2s ease;
}

.package-card.selected {
  border: 2px solid #f4600c;
  box-shadow: 0 0 0 2px rgba(244,96,12,0.2);
}

/* ===== AI CHAT BOX ===== */
#scanChatWrap {
  margin-top: 20px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 16px;
  background: #f9fafb;
}

/* ===== MODAL FIX ===== */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  background: rgba(0,0,0,0.6);
}

.modal.active {
  display: flex;
}
</style>

<script>
/* =========================
   GLOBAL SCAN CONTEXT FIX
========================= */

window.scanContext = null;

/* Call this AFTER scan completes */
function storeScanResults(result) {
  window.scanContext = {
    score: Number(result.score) || null,
    url: result.url || '',
    trade: result.trade || 'bathroom fitter',
    issues: Array.isArray(result.issues) ? result.issues : [],
    categories: result.categories || {}
  };

  console.log("SCAN CONTEXT STORED:", window.scanContext);
}

/* =========================
   PROBLEM BUTTONS FIX
========================= */

document.querySelectorAll('.problem-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.problem-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    window.selectedProblem = btn.innerText;
  });
});

/* =========================
   PACKAGE SELECT FIX
========================= */

document.querySelectorAll('.package-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');

    const radio = card.querySelector('input[type="radio"]');
    if (radio) radio.checked = true;
  });
});

/* =========================
   AI CHAT FIX (CRITICAL)
========================= */

async function sendChatMessage(message) {
  if (!window.scanContext || !window.scanContext.score) {
    alert("Scan data missing. Please rescan.");
    return;
  }

  console.log("SENDING SCAN CONTEXT:", window.scanContext);

  const res = await fetch('/.netlify/functions/scan-chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: "user", content: message }],
      scan_context: window.scanContext
    })
  });

  const data = await res.json();
  return data.reply;
}

/* =========================
   FORM SUBMIT PATCH
========================= */

function attachLeadData(payload) {
  payload.problem = window.selectedProblem || null;
  return payload;
}

/* =========================
   SAFE SCORE DISPLAY FIX
========================= */

function getScoreText() {
  if (!window.scanContext || !window.scanContext.score) {
    return "your results";
  }
  return `${window.scanContext.score}/100`;
}

/* =========================
   ENSURE CHAT VISIBILITY
========================= */

function showAIChat() {
  const el = document.getElementById('scanChatWrap');
  if (el) el.style.display = 'block';
}

/* call AFTER unlock */
</script>
